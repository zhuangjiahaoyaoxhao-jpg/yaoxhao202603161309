<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 - 致最特别的你</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 全屏烟花画布 -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- 背景音乐 (请确保同目录下有 birthday.mp3 文件) -->
    <audio id="bgm" src="birthday.mp3" preload="auto"></audio>

    <div class="background-animation">
        <!-- 动态生成的漂浮元素 -->
    </div>

    <div class="container">
        <!-- 第一阶段：祝福展示区 -->
        <section id="greetingSection" class="section active">
            <header>
                <div class="cake-container">
                    <div class="cake-icon">🎂</div>
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                </div>
                <h1 class="title">Happy Birthday!</h1>
                <div class="message-box">
                    <p class="typing-text">亲爱的大菜：</p>
                    <p class="fade-in-text delay-1">在这特别的日子里，</p>
                    <p class="fade-in-text delay-2">愿你的世界永远充满阳光与欢笑，</p>
                    <p class="fade-in-text delay-3">愿你眼里的星星永远闪耀，</p>
                    <p class="fade-in-text delay-4">愿你所有的温柔都被岁月温柔以待。</p>
                    <p class="fade-in-text delay-5">生日快乐！💖</p>
                </div>
            </header>
            
            <button id="startWishBtn" class="pulse-button primary-btn">
                ✨ 开始许愿 ✨
            </button>
        </section>

        <!-- 第二阶段：许愿卡片区 (默认隐藏) -->
        <section id="wishSection" class="section hidden">
            <div class="wish-card">
                <div class="card-content">
                    <div class="back-btn" id="backToGreeting">← 返回</div>
                    <h2>闭上眼睛，许个愿吧 ✨</h2>
                    <p class="instruction-text">在这个神奇的时刻，写下你心底最想实现的愿望...</p>
                    <textarea id="wishInput" placeholder="比如：希望今年暴富，或者变瘦变美..."></textarea>
                    <button id="wishBtn" class="send-btn">发送给老爷 🙏</button>
                </div>
            </div>
        </section>

        <!-- 自定义弹窗 -->
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <div class="modal-icon">�</div>
                <h3>愿望已收到！</h3>
                <p class="blessing-text">老爷一定会保佑愿望成真的！🙏</p>
                
                <!-- 模拟语音条 -->
                <div class="voice-message-container" id="playVoiceBtn">
                    <div class="voice-bubble">
                        <span class="voice-icon">🔊</span>
                        <span class="voice-wave">
                            <span class="bar bar1"></span>
                            <span class="bar bar2"></span>
                            <span class="bar bar3"></span>
                        </span>
                        <span class="voice-duration">Happy Birthday 🎵</span>
                    </div>
                </div>

                <p class="small-text tip-text">( 点击上面的语音条再次播放生日歌 🎶 )</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
